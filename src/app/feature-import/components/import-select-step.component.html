<div class="flex flex-col gap-4">
  <fieldset class="fieldset">
    <legend class="fieldset-legend">Account</legend>
    <select class="select w-full" [value]="accountId() ?? ''" (change)="onAccountChange($event)">
      <option value="" disabled>Choose an account</option>
      @for (account of accounts(); track account.id) {
        <option [value]="account.id">{{ account.name }}</option>
      }
    </select>
  </fieldset>

  <fieldset class="fieldset">
    <legend class="fieldset-legend">CSV file</legend>
    <div
      class="flex flex-col items-center justify-center gap-2 rounded-box border-2 border-dashed border-base-300 p-8 text-center"
      (drop)="onDrop($event)"
      (dragover)="onDragOver($event)"
    >
      @if (file(); as selectedFile) {
        <p class="font-medium">{{ selectedFile.name }}</p>
        <p class="text-xs text-base-content/60">{{ (selectedFile.size / 1024).toFixed(1) }} KB</p>
      } @else {
        <p class="text-sm text-base-content/60">Drag & drop a CSV file here, or</p>
      }
      <label class="btn btn-sm">
        Browse
        <input
          type="file"
          accept=".csv,text/csv"
          class="hidden"
          (change)="onFileSelected($event)"
        />
      </label>
    </div>
  </fieldset>
</div>
