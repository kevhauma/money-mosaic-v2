<mm-flex direction="col" gap="4">
  <mm-fieldset legend="CSV files">
    <mm-flex
      direction="col"
      align="center"
      justify="center"
      gap="2"
      class="rounded-box border-2 border-dashed border-base-300 p-8 text-center"
      (drop)="onDrop($event)"
      (dragover)="onDragOver($event)"
    >
      <mm-text as="p" class="text-sm text-base-content/60"
        >Drag &#38; drop one or more CSV files here, or</mm-text
      >
      <label class="btn btn-sm">
        Browse
        <input
          type="file"
          accept=".csv,text/csv"
          multiple
          class="hidden"
          (change)="onFileSelected($event)"
        />
      </label>
    </mm-flex>
  </mm-fieldset>

  @if (queue().length > 0) {
    <mm-fieldset [legend]="'Files (' + queue().length + ')'">
      <ul class="flex flex-col gap-2">
        @for (row of queue(); track row.file; let i = $index) {
          <li>
            <mm-paper elevation="flat" bodyClass="flex flex-wrap items-center gap-3 p-3">
              <div class="min-w-0 flex-1">
                <mm-text as="p" weight="medium" class="truncate text-sm">{{
                  row.file.name
                }}</mm-text>
                <mm-text as="p" class="text-xs text-base-content/60"
                  >{{ (row.file.size / 1024).toFixed(1) }} KB</mm-text
                >
              </div>
              <select
                class="select select-sm w-48"
                [value]="row.accountId ?? ''"
                (change)="onAccountChange(i, $event)"
              >
                <option value="" disabled>Choose an account</option>
                @for (account of accounts(); track account.id) {
                  <option [value]="account.id">{{ account.name }}</option>
                }
              </select>
              @if (row.autoDetected) {
                <mm-badge color="success" size="sm">Auto-detected</mm-badge>
              }
              <mm-button
                variant="ghost"
                size="sm"
                shape="square"
                ariaLabel="Remove file"
                (click)="removeFile(i)"
              >
                ✕
              </mm-button>
            </mm-paper>
          </li>
        }
      </ul>
    </mm-fieldset>
  }
</mm-flex>
