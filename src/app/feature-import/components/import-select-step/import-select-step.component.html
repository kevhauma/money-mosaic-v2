<mm-flex direction="col" gap="4">
  <mm-fieldset legend="CSV files">
    <mm-flex
      direction="col"
      align="center"
      justify="center"
      gap="2"
      class="rounded-box border-2 border-dashed border-base-300 p-8 text-center"
      (drop)="onDrop($event)"
      (dragover)="onDragOver($event)"
    >
      <mm-text as="p" class="text-sm text-base-content/60"
        >Drag &#38; drop one or more CSV files here, or</mm-text
      >
      <label class="btn btn-sm">
        Browse
        <input
          type="file"
          accept=".csv,text/csv"
          multiple
          class="hidden"
          (change)="onFileSelected($event)"
        />
      </label>
    </mm-flex>
  </mm-fieldset>

  @if (queue().length > 0) {
    <mm-fieldset [legend]="'Files (' + queue().length + ')'">
      <ul class="flex flex-col gap-2">
        @for (row of queue(); track row.file) {
          <li>
            <mm-paper elevation="flat" bodyClass="flex flex-wrap items-center gap-3 p-3">
              <app-queued-file-row
                [row]="row"
                [accounts]="accounts()"
                [pendingDrafts]="pendingDrafts()"
                [mode]="rowMode(row)"
                (accountChange)="onAccountChange(row.file, $event)"
                (newAccountRequested)="startNewAccountDraft(row.file)"
                (removed)="removeFile(row.file)"
                (draftNameChange)="updateDraftName(row.pendingDraftId!, $event)"
                (draftIbanChange)="updateDraftIban(row.pendingDraftId!, $event)"
                (draftTypeChange)="updateDraftType(row.pendingDraftId!, $event)"
                (draftCancelled)="cancelDraft(row.pendingDraftId!)"
              />
            </mm-paper>
          </li>
        }
      </ul>
    </mm-fieldset>
  }
</mm-flex>
