<mm-page-header title="FAQ" subtitle="Why the app does what it does" />

<div class="flex flex-col gap-3">
  @for (entry of entries; track entry.question) {
    <mm-collapse>
      <mm-text mm-collapse-title as="span" weight="semibold">{{ entry.question }}</mm-text>
      <mm-text as="p" variant="caption" class="block pb-2">{{ entry.answer }}</mm-text>
    </mm-collapse>
  }
</div>
