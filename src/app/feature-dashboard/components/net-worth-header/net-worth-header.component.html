<div class="rounded-box border border-primary/30 bg-primary/10 px-4 py-2 text-right">
  <mm-text variant="label" as="p" color="primary">Net worth</mm-text>
  <mm-text variant="display" as="p" color="primary" [numeric]="true">
    @if (accountsStore.dataReady()) {
      {{ accountsStore.netWorth() | signedAmount }}
    } @else {
      <span class="skeleton inline-block h-6 w-20 align-middle"></span>
    }
  </mm-text>
</div>
