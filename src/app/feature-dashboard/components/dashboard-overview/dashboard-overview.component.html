<mm-page-header title="Dashboard">
  <div actions>
    <app-net-worth-header />
  </div>
</mm-page-header>

<div class="stats stats-vertical mb-6 w-full shadow lg:stats-horizontal">
  <mm-stat-card
    label="Income"
    [value]="incomeValue()"
    link="/transactions"
    [queryParams]="drilldownParams()"
  />
  <mm-stat-card
    label="Expense"
    [value]="expenseValue()"
    link="/transactions"
    [queryParams]="drilldownParams()"
  />
  <mm-stat-card
    label="Net cash flow"
    [value]="netValue()"
    [color]="netColor()"
    link="/transactions"
    [queryParams]="drilldownParams()"
  />
  <mm-stat-card label="Savings rate" [value]="savingsRateValue()" />
</div>

<div class="mb-6 grid grid-cols-1 gap-6 lg:grid-cols-2">
  <app-category-breakdown-panel />
  <app-trend-chart-panel />
</div>

<div class="mb-6">
  <app-action-queue-panel />
</div>

<app-account-balance-strip />
