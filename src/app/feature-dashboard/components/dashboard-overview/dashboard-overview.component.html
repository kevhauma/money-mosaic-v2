<mm-page-header title="Dashboard">
  <div actions>
    <app-net-worth-header />
  </div>
</mm-page-header>

<div class="stats stats-vertical mb-6 w-full overflow-visible shadow lg:stats-horizontal">
  <mm-stat-card
    label="Income"
    [value]="incomeValue()"
    [subLabel]="incomeYoySubLabel()"
    [tooltip]="incomeYoyTooltip()"
    link="/transactions"
    [queryParams]="drilldownParams()"
  />
  <mm-stat-card
    label="Expense"
    [value]="expenseValue()"
    [subLabel]="expenseYoySubLabel()"
    [tooltip]="expenseYoyTooltip()"
    link="/transactions"
    [queryParams]="drilldownParams()"
  />
  <mm-stat-card
    label="Net cash flow"
    [value]="netValue()"
    [subLabel]="netYoySubLabel()"
    [tooltip]="netYoyTooltip()"
    [color]="netColor()"
    link="/transactions"
    [queryParams]="drilldownParams()"
  />
  <mm-stat-card label="Savings rate" [value]="savingsRateValue()" [subLabel]="savingsSubLabel()" />
  <mm-stat-card
    label="Spending rate"
    [value]="spendingRateValue()"
    [subLabel]="spendingRateSubLabel()"
  />
</div>

<div class="mb-6">
  <app-weekday-weekend-split-panel />
</div>

<div class="mb-6 grid grid-cols-1 gap-6 lg:grid-cols-2">
  <app-category-breakdown-panel />
  <app-trend-chart-panel />
</div>

<div class="mb-6">
  <app-top-transactions-panel />
</div>

<div class="mb-6">
  <app-action-queue-panel />
</div>

<app-account-balance-strip />
