<div class="card h-full bg-base-100 shadow-sm">
  <div class="card-body">
    <div class="flex items-center justify-between">
      <h2 class="card-title text-base">Category breakdown</h2>
      <div class="join">
        <button
          type="button"
          class="btn btn-xs join-item"
          [class.btn-active]="kind() === 'expense'"
          (click)="setKind('expense')"
        >
          Expense
        </button>
        <button
          type="button"
          class="btn btn-xs join-item"
          [class.btn-active]="kind() === 'income'"
          (click)="setKind('income')"
        >
          Income
        </button>
      </div>
    </div>

    @if (entries().length > 0) {
      <div echarts [options]="chartOption()" class="h-56 w-full"></div>

      <ul class="mt-2 divide-y divide-base-300">
        @for (entry of topEntries(); track entry.categoryId) {
          <li>
            <a
              [routerLink]="['/transactions']"
              [queryParams]="drilldownParams(entry.categoryId)"
              class="flex items-center justify-between py-2 transition hover:bg-base-200"
            >
              <span>{{ categoryName(entry.categoryId) }}</span>
              <span class="text-sm text-base-content/70">
                {{ formatTotal(entry.total) }} · {{ formatShare(entry.share) }}
              </span>
            </a>
          </li>
        }
      </ul>

      <a
        [routerLink]="['/categories']"
        [queryParams]="viewAllQueryParams()"
        class="link mt-2 text-sm"
      >
        View all categories
      </a>
    } @else {
      <p class="py-6 text-center text-sm text-base-content/60">
        No {{ kind() }} data for this range.
      </p>
    }
  </div>
</div>
