<mm-paper>
  <h2 class="card-title text-base">Accounts</h2>
  <div class="flex flex-wrap gap-3">
    @for (account of accountsStore.activeAccounts(); track account.id) {
      <mm-paper
        elevation="flat"
        background=""
        bodyClass="flex flex-col px-4 py-3"
        class="min-w-[10rem]"
        [link]="'/accounts/' + account.id"
      >
        <mm-text variant="caption">{{ account.name }}</mm-text>
        <mm-text weight="semibold">{{ balanceFor(account.id!) | signedAmount }}</mm-text>
      </mm-paper>
    }
  </div>
</mm-paper>
