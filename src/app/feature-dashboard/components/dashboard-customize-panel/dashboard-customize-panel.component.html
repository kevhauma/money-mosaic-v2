<mm-paper elevation="flat" bodyClass="p-4" class="mb-6 shadow">
  <mm-flex align="center" justify="between" gap="3" class="mb-3">
    <mm-text as="h2" variant="subheading" weight="semibold">Customize dashboard layout</mm-text>
    <mm-button variant="ghost" size="sm" (click)="reset()">
      <ng-icon name="tablerRestore" size="16" aria-hidden="true" />
      Reset to default
    </mm-button>
  </mm-flex>

  <mm-flex cdkDropList direction="col" gap="2" (cdkDropListDropped)="onDrop($event)">
    @for (rowId of rows(); track rowId; let first = $first; let last = $last) {
      <mm-flex
        cdkDrag
        align="center"
        gap="2"
        class="rounded-box border border-base-300 bg-base-200/50 p-2"
        [class.opacity-50]="isHidden(rowId)"
      >
        <span cdkDragHandle class="cursor-grab text-base-content/50" aria-hidden="true">
          <ng-icon name="tablerGripVertical" size="18" />
        </span>
        <mm-text variant="caption" color="base-content" class="flex-1">{{
          rowLabels[rowId]
        }}</mm-text>
        <mm-flex align="center" gap="1">
          <mm-button
            variant="ghost"
            size="sm"
            [disabled]="first"
            [ariaLabel]="'Move ' + rowLabels[rowId] + ' up'"
            (click)="moveRow(rowId, 'up')"
          >
            <ng-icon name="tablerChevronUp" size="14" aria-hidden="true" />
          </mm-button>
          <mm-button
            variant="ghost"
            size="sm"
            [disabled]="last"
            [ariaLabel]="'Move ' + rowLabels[rowId] + ' down'"
            (click)="moveRow(rowId, 'down')"
          >
            <ng-icon name="tablerChevronDown" size="14" aria-hidden="true" />
          </mm-button>
          <mm-button
            variant="ghost"
            size="sm"
            [ariaLabel]="(isHidden(rowId) ? 'Show ' : 'Hide ') + rowLabels[rowId]"
            (click)="toggleHidden(rowId)"
          >
            <ng-icon
              [name]="isHidden(rowId) ? 'tablerEyeOff' : 'tablerEye'"
              size="16"
              aria-hidden="true"
            />
          </mm-button>
        </mm-flex>
      </mm-flex>
    }
  </mm-flex>
</mm-paper>
