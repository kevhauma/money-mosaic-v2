@if (split(); as s) {
  <a
    [routerLink]="['/transactions']"
    [queryParams]="drilldownParams()"
    class="card h-full bg-base-100 shadow-sm transition hover:bg-base-200"
  >
    <div class="card-body">
      <h2 class="card-title text-base">Weekday vs. weekend spending</h2>

      <div class="mt-2 space-y-3">
        <div>
          <div class="mb-1 flex items-center justify-between text-sm">
            <span>Weekday</span>
            <span class="text-base-content/70">{{ weekdayAvgValue() }}/day</span>
          </div>
          <div class="h-2 w-full rounded-full bg-base-300">
            <div class="h-2 rounded-full bg-primary" [style.width.%]="barPercents().weekday"></div>
          </div>
        </div>

        <div>
          <div class="mb-1 flex items-center justify-between text-sm">
            <span>Weekend</span>
            <span class="text-base-content/70">{{ weekendAvgValue() }}/day</span>
          </div>
          <div class="h-2 w-full rounded-full bg-base-300">
            <div
              class="h-2 rounded-full bg-secondary"
              [style.width.%]="barPercents().weekend"
            ></div>
          </div>
        </div>
      </div>

      @if (ratioLabel(); as ratio) {
        <p class="mt-2 text-sm text-base-content/70">{{ ratio }}</p>
      }
    </div>
  </a>
}
