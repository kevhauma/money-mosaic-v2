<div class="card h-full bg-base-100 shadow-sm">
  <div class="card-body">
    <div class="flex items-center justify-between gap-2">
      <h2 class="card-title text-base">Trend</h2>
      <mm-granularity-picker [value]="granularity()" (valueChange)="granularity.set($event)" />
    </div>
    <div
      echarts
      [options]="chartOption()"
      (chartClick)="onChartClick($event)"
      class="h-72 w-full"
    ></div>
  </div>
</div>
