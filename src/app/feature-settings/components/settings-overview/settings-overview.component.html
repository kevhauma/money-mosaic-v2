<mm-page-header title="Settings" subtitle="Make Money Mosaic yours" />

<mm-paper>
  <mm-text variant="heading" as="h2">Theme</mm-text>
  <mm-text as="p" variant="caption" class="mt-1">
    Pick a theme — choosing one switches you to it right away.
  </mm-text>

  <div class="mt-6 grid grid-cols-[repeat(auto-fill,minmax(220px,1fr))] gap-4">
    @for (style of styles; track style.id) {
      <button
        type="button"
        [attr.data-theme]="style.dataTheme"
        class="group mm-elev-raised rounded-box border border-base-300 bg-(--mm-surface-raised) text-left text-base-content transition focus-visible:outline-2 focus-visible:outline-primary"
        [class.ring-2]="isSelected(style.id)"
        [class.ring-primary]="isSelected(style.id)"
        [attr.aria-pressed]="isSelected(style.id)"
        (click)="onSelect(style.id)"
      >
        <span class="block rounded-box border border-base-300 bg-base-100 p-3">
          <span class="mm-brand flex items-center gap-1.5">
            <span class="mm-brand-icon" aria-hidden="true"></span>
            <span class="font-display text-sm font-bold text-base-content">Aa 123</span>
          </span>
          <span class="mt-2 flex gap-1">
            <span class="rounded-field h-4 w-9 bg-primary"></span>
            <span class="rounded-field h-4 w-9 bg-secondary"></span>
            <span class="rounded-field h-4 w-9 bg-accent"></span>
          </span>
          <span class="mt-2 block h-2 w-3/4 rounded-selector bg-base-300"></span>
        </span>
        <span class="mt-2 flex items-center gap-2 px-1">
          <mm-text as="span" weight="semibold" class="text-sm">{{ style.label }}</mm-text>
          @if (isSelected(style.id)) {
            <span class="badge badge-primary badge-sm">Active</span>
          }
        </span>
        <mm-text as="p" variant="caption" class="px-1 pb-1">{{ style.tagline }}</mm-text>
      </button>
    }
  </div>
</mm-paper>
