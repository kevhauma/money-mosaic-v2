@if (account(); as account) {
  <mm-page-header [title]="account.name" [subtitle]="account.type | titlecase">
    <div actions class="flex items-center gap-2">
      <mm-button variant="ghost" size="sm" link="/accounts">Back to accounts</mm-button>
      <mm-button size="sm" (click)="formOpen.set(true)">
        <ng-icon name="tablerPencil" size="14" aria-hidden="true" />
        Edit
      </mm-button>
      <mm-button size="sm" (click)="toggleArchive()">
        <ng-icon
          [name]="account.archived ? 'tablerArchiveOff' : 'tablerArchive'"
          size="14"
          aria-hidden="true"
        />
        {{ account.archived ? 'Unarchive' : 'Archive' }}
      </mm-button>
      <mm-button
        variant="outline"
        size="sm"
        [disabled]="transactionCount() === 0"
        (click)="clearConfirmOpen.set(true)"
      >
        <ng-icon name="tablerEraser" size="14" aria-hidden="true" />
        Clear transactions
      </mm-button>
      <mm-button variant="outline" color="error" size="sm" (click)="deleteConfirmOpen.set(true)">
        <ng-icon name="tablerTrash" size="14" aria-hidden="true" />
        Delete
      </mm-button>
    </div>
  </mm-page-header>

  <div class="card border border-base-300 bg-base-100">
    <div class="card-body">
      <p class="text-sm text-base-content/60">Current balance</p>
      <p class="text-4xl font-semibold" [class.text-error]="balance() < 0">
        {{ balance() | signedAmount }}
      </p>
      @if (account.iban) {
        <p class="mt-2 text-sm text-base-content/60">IBAN ···· {{ account.iban.slice(-4) }}</p>
      }
    </div>
  </div>

  <div class="mt-6">
    <app-account-balance-chart [account]="account" />
  </div>

  <app-account-form [(open)]="formOpen" [account]="account" (saved)="saveAccount($event)" />
  <mm-confirm-dialog
    [(open)]="deleteConfirmOpen"
    title="Delete this account?"
    [message]="deleteMessage()"
    confirmLabel="Delete account"
    [danger]="true"
    (confirmed)="deleteConfirmed()"
  />
  <mm-confirm-dialog
    [(open)]="clearConfirmOpen"
    title="Clear this account's transactions?"
    [message]="clearMessage()"
    confirmLabel="Clear transactions"
    [danger]="true"
    (confirmed)="clearConfirmed()"
  />
} @else {
  <mm-empty-state title="Account not found" message="It may have been deleted or archived away.">
    <mm-button action color="primary" class="mt-2" link="/accounts">Back to accounts</mm-button>
  </mm-empty-state>
}
