<mm-paper elevation="flat">
  <div class="flex items-center justify-between gap-2">
    <p class="card-title text-base">Balance history</p>
    <mm-granularity-picker [value]="granularity()" (valueChange)="granularity.set($event)" />
  </div>
  <div
    echarts
    [options]="chartOption()"
    (chartClick)="onChartClick($event)"
    class="h-72 w-full"
  ></div>
</mm-paper>
