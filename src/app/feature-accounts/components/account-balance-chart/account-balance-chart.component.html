<div class="card border border-base-300 bg-base-100">
  <div class="card-body">
    <div class="flex items-center justify-between gap-2">
      <p class="card-title text-base">Balance history</p>
      <mm-granularity-picker [value]="granularity()" (valueChange)="granularity.set($event)" />
    </div>
    <div
      echarts
      [options]="chartOption()"
      (chartClick)="onChartClick($event)"
      class="h-72 w-full"
    ></div>
  </div>
</div>
