<div class="drawer lg:drawer-open">
  <input
    id="app-drawer"
    type="checkbox"
    class="drawer-toggle"
    [checked]="drawerOpen()"
    (change)="onDrawerCheckboxChange($event)"
  />

  <div class="drawer-content flex min-h-screen flex-col bg-base-200">
    <div class="navbar flex-wrap gap-2 border-b border-base-300 bg-base-100 px-4">
      <div class="flex items-center lg:hidden">
        <mm-button
          shape="square"
          variant="ghost"
          ariaLabel="Open menu"
          (click)="drawerOpen.set(true)"
        >
          <ng-icon name="tablerMenu2" size="20" aria-hidden="true" />
        </mm-button>
        <span class="ml-2 text-lg font-semibold">Money Mosaic</span>
      </div>
      <div class="ml-2 flex items-center">
        <mm-range-grouping-switcher
          [value]="switcherValue()"
          (presetChange)="onPresetChange($event)"
          (customRangeChange)="onCustomRangeChange($event)"
          (rangeShift)="onRangeShift($event)"
        />
      </div>
      <div class="ml-auto flex items-center">
        <mm-button
          shape="square"
          variant="ghost"
          [ariaLabel]="
            themeService.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'
          "
          (click)="themeService.toggle()"
        >
          <ng-icon
            [name]="themeService.theme() === 'dark' ? 'tablerSun' : 'tablerMoon'"
            size="18"
            aria-hidden="true"
          />
        </mm-button>
      </div>
    </div>

    <main class="flex-1 p-4 lg:p-6">
      <router-outlet />
    </main>
  </div>

  <div class="drawer-side z-20">
    <label for="app-drawer" aria-label="Close menu" class="drawer-overlay"></label>
    <div class="menu min-h-full w-64 border-r border-base-300 bg-base-100 p-4">
      <span class="hidden px-2 pb-4 text-lg font-semibold lg:block">Money Mosaic</span>
      <ul class="menu-vertical gap-1">
        <li>
          <a routerLink="/dashboard" routerLinkActive="menu-active">
            <ng-icon name="tablerHome" size="18" aria-hidden="true" />
            Dashboard
          </a>
        </li>
        <li>
          <a routerLink="/accounts" routerLinkActive="menu-active">
            <ng-icon name="tablerBuildingBank" size="18" aria-hidden="true" />
            Accounts
          </a>
        </li>
        <li>
          <a routerLink="/transactions" routerLinkActive="menu-active">
            <ng-icon name="tablerArrowsExchange" size="18" aria-hidden="true" />
            Transactions
            @if (transactionsStore.uncategorisedCount(); as count) {
              <span class="badge badge-warning badge-sm ml-auto">{{ count }}</span>
            }
          </a>
        </li>
        <li>
          <a routerLink="/categories" routerLinkActive="menu-active">
            <ng-icon name="tablerTags" size="18" aria-hidden="true" />
            Categories
          </a>
        </li>
        <li>
          <a routerLink="/learning" routerLinkActive="menu-active">
            <ng-icon name="tablerBulb" size="18" aria-hidden="true" />
            Learning
          </a>
        </li>
        <li>
          <a routerLink="/import" routerLinkActive="menu-active">
            <ng-icon name="tablerFileImport" size="18" aria-hidden="true" />
            Import
          </a>
        </li>
        <li>
          <a routerLink="/data" routerLinkActive="menu-active">
            <ng-icon name="tablerDatabase" size="18" aria-hidden="true" />
            Data
          </a>
        </li>
      </ul>
    </div>
  </div>
</div>
