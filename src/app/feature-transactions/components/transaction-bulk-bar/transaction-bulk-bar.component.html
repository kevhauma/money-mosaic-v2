<mm-paper
  elevation="flat"
  background="bg-primary/5"
  borderColor="primary/40"
  bodyClass="flex flex-wrap items-center gap-3 p-3"
  class="mb-4"
>
  <mm-text weight="medium">
    <ng-icon name="tablerTag" size="16" aria-hidden="true" class="align-text-bottom" />
    {{ count() }} selected
  </mm-text>

  <mm-flex align="end" gap="2">
    <mm-select [formControl]="categoryControl" size="sm">
      <option value="">Assign category…</option>
      @for (category of categoriesStore.activeCategories(); track category.id) {
        <option [value]="category.id">{{ category.name }}</option>
      }
    </mm-select>
    <mm-button
      color="primary"
      size="sm"
      [disabled]="categoryControl.value === ''"
      (click)="apply()"
    >
      Apply
    </mm-button>
  </mm-flex>

  <mm-flex align="center" gap="2" class="ms-auto">
    <mm-button variant="ghost" size="sm" (click)="selectAllRequested.emit()">
      Select all {{ filteredCount() }}
    </mm-button>
    <mm-button color="error" variant="outline" size="sm" (click)="confirmDelete()">
      <ng-icon name="tablerTrash" size="16" aria-hidden="true" />
      Delete
    </mm-button>
    <mm-button variant="ghost" size="sm" (click)="clearRequested.emit()">
      <ng-icon name="tablerX" size="16" aria-hidden="true" />
      Clear
    </mm-button>
  </mm-flex>
</mm-paper>

<mm-confirm-dialog
  [(open)]="deleteConfirmOpen"
  title="Delete {{ count() }} transaction{{ count() === 1 ? '' : 's' }}?"
  message="This permanently deletes the selected transactions and cannot be undone. Any transfer links touching them will also be removed."
  confirmLabel="Delete permanently"
  [danger]="true"
  (confirmed)="deleteConfirmed()"
/>
