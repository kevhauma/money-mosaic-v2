<mm-paper elevation="flat" bodyClass="" class="mb-4">
  <form [formGroup]="filterForm" class="grid grid-cols-2 gap-3 p-4 sm:grid-cols-3 lg:grid-cols-6">
    <mm-fieldset legend="Account">
      <mm-select formControlName="accountId" size="sm" class="w-full">
        <option value="">All accounts</option>
        @for (account of accountsStore.accounts(); track account.id) {
          <option [value]="account.id">{{ account.name }}</option>
        }
      </mm-select>
    </mm-fieldset>

    <mm-fieldset legend="Date range">
      <mm-date-range-input
        [value]="dateRangeValue()"
        (valueChange)="onDateRangeChange($event)"
        size="sm"
        class="w-full"
      />
    </mm-fieldset>

    <mm-fieldset legend="Category">
      <mm-select formControlName="categoryId" size="sm" class="w-full">
        <option value="">All categories</option>
        <option value="uncategorised">Uncategorised</option>
        @for (category of categoriesStore.activeCategories(); track category.id) {
          <option [value]="category.id">{{ category.name }}</option>
        }
      </mm-select>
    </mm-fieldset>

    <mm-fieldset legend="Amount type">
      <div class="join" role="group" aria-label="Amount direction">
        <button
          type="button"
          class="btn btn-sm join-item"
          [class.btn-primary]="amountDirection() === 'expense'"
          [class.btn-outline]="amountDirection() !== 'expense'"
          (click)="setAmountDirection('expense')"
        >
          Expenses
        </button>
        <button
          type="button"
          class="btn btn-sm join-item"
          [class.btn-primary]="amountDirection() === 'income'"
          [class.btn-outline]="amountDirection() !== 'income'"
          (click)="setAmountDirection('income')"
        >
          Income
        </button>
      </div>
    </mm-fieldset>

    <mm-fieldset legend="Min amount">
      <mm-input
        type="number"
        step="0.01"
        min="0"
        formControlName="amountMin"
        size="sm"
        class="w-full"
      />
    </mm-fieldset>

    <mm-fieldset legend="Max amount">
      <mm-input
        type="number"
        step="0.01"
        min="0"
        formControlName="amountMax"
        size="sm"
        class="w-full"
      />
    </mm-fieldset>

    <mm-fieldset legend="Search" class="col-span-2 sm:col-span-3 lg:col-span-5">
      <mm-input
        type="text"
        formControlName="text"
        size="sm"
        class="w-full"
        placeholder="Description or counterparty"
      />
    </mm-fieldset>

    <mm-flex align="center" justify="center" gap="2" class="h-full">
      <div
        class="tooltip flex-1"
        [attr.data-tip]="
          canMakeRuleFromFilter() ? null : 'Set a text, account, or amount filter first'
        "
      >
        <mm-button
          variant="ghost"
          size="sm"
          class="w-full"
          [disabled]="!canMakeRuleFromFilter()"
          (click)="onMakeRuleFromFilter()"
        >
          Make rule from filter
        </mm-button>
      </div>
      <mm-button
        variant="ghost"
        size="sm"
        class="flex-1"
        [disabled]="!hasActiveFilters()"
        (click)="clearFilters()"
      >
        <ng-icon name="tablerFilterOff" size="16" aria-hidden="true" />
        Clear
      </mm-button>
    </mm-flex>
  </form>
</mm-paper>
