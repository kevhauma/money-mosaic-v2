<mm-paper elevation="flat" bodyClass="" class="mb-4">
  <form [formGroup]="filterForm" class="grid grid-cols-2 gap-3 p-4 sm:grid-cols-3 lg:grid-cols-6">
    <fieldset class="fieldset">
      <legend class="fieldset-legend">Account</legend>
      <mm-select formControlName="accountId" size="sm" class="w-full">
        <option value="">All accounts</option>
        @for (account of accountsStore.accounts(); track account.id) {
          <option [value]="account.id">{{ account.name }}</option>
        }
      </mm-select>
    </fieldset>

    <fieldset class="fieldset col-span-2">
      <legend class="fieldset-legend">Date range</legend>
      <mm-date-range-input
        [value]="dateRangeValue()"
        (valueChange)="onDateRangeChange($event)"
        size="sm"
        class="w-full"
      />
    </fieldset>

    <fieldset class="fieldset">
      <legend class="fieldset-legend">Category</legend>
      <mm-select formControlName="categoryId" size="sm" class="w-full">
        <option value="">All categories</option>
        <option value="uncategorised">Uncategorised</option>
        @for (category of categoriesStore.activeCategories(); track category.id) {
          <option [value]="category.id">{{ category.name }}</option>
        }
      </mm-select>
    </fieldset>

    <fieldset class="fieldset">
      <legend class="fieldset-legend">Min amount</legend>
      <mm-input type="number" step="0.01" formControlName="amountMin" size="sm" class="w-full" />
    </fieldset>

    <fieldset class="fieldset">
      <legend class="fieldset-legend">Max amount</legend>
      <mm-input type="number" step="0.01" formControlName="amountMax" size="sm" class="w-full" />
    </fieldset>

    <fieldset class="fieldset col-span-2 sm:col-span-3 lg:col-span-5">
      <legend class="fieldset-legend">Search</legend>
      <mm-input
        type="text"
        formControlName="text"
        size="sm"
        class="w-full"
        placeholder="Description or counterparty"
      />
    </fieldset>

    <div class="flex items-end">
      <mm-button
        variant="ghost"
        size="sm"
        class="w-full"
        [disabled]="!hasActiveFilters()"
        (click)="clearFilters()"
      >
        <ng-icon name="tablerFilterOff" size="16" aria-hidden="true" />
        Clear
      </mm-button>
    </div>
  </form>
</mm-paper>
