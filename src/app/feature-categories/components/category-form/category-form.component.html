<dialog #dialog class="modal" (close)="open.set(false)">
  <div class="modal-box">
    <h3 class="text-lg font-semibold">{{ category() ? 'Edit category' : 'Add category' }}</h3>

    <form [formGroup]="form" (ngSubmit)="submit()" class="mt-2">
      <fieldset class="fieldset">
        <legend class="fieldset-legend">Name</legend>
        <mm-input type="text" formControlName="name" class="w-full" placeholder="e.g. Groceries" />
        @if (form.controls.name.invalid && form.controls.name.touched) {
          <p class="label text-error">Name is required.</p>
        }
      </fieldset>

      <div class="grid grid-cols-2 gap-3">
        <fieldset class="fieldset">
          <legend class="fieldset-legend">Kind</legend>
          <mm-select formControlName="kind" class="w-full">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </mm-select>
        </fieldset>
        <fieldset class="fieldset">
          <legend class="fieldset-legend">Group (optional)</legend>
          <mm-input type="text" formControlName="group" class="w-full" placeholder="e.g. Income" />
        </fieldset>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <fieldset class="fieldset">
          <legend class="fieldset-legend">Colour</legend>
          <input
            type="color"
            formControlName="color"
            class="h-10 w-full rounded-field border border-base-300 bg-base-100"
          />
        </fieldset>
        <fieldset class="fieldset">
          <legend class="fieldset-legend">Icon</legend>
          <mm-select formControlName="icon" class="w-full">
            @for (option of iconOptions; track option.value) {
              <option [value]="option.value">{{ option.label }}</option>
            }
          </mm-select>
        </fieldset>
      </div>

      <div class="modal-action">
        <mm-button (click)="cancel()">Cancel</mm-button>
        <mm-button type="submit" color="primary">
          {{ category() ? 'Save changes' : 'Add category' }}
        </mm-button>
      </div>
    </form>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button type="submit">close</button>
  </form>
</dialog>
