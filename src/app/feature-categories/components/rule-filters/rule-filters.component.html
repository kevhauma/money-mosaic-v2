<mm-paper elevation="flat" bodyClass="" class="mb-4">
  <form [formGroup]="filterForm" class="grid grid-cols-2 gap-3 p-4 sm:grid-cols-4">
    <mm-fieldset legend="Search" class="col-span-2">
      <mm-input
        type="text"
        formControlName="text"
        size="sm"
        class="w-full"
        placeholder="Rule name or condition"
      />
    </mm-fieldset>

    <mm-fieldset legend="Category">
      <mm-select formControlName="categoryId" size="sm" class="w-full">
        <option value="">All categories</option>
        @for (category of categoriesStore.activeCategories(); track category.id) {
          <option [value]="category.id">{{ category.name }}</option>
        }
      </mm-select>
    </mm-fieldset>

    <mm-fieldset legend="Status">
      <mm-select formControlName="enabled" size="sm" class="w-full">
        <option value="">All rules</option>
        <option value="enabled">Enabled only</option>
        <option value="disabled">Disabled only</option>
      </mm-select>
    </mm-fieldset>

    <div class="col-span-2 flex items-end sm:col-span-4">
      <mm-button
        variant="ghost"
        size="sm"
        [disabled]="!hasActiveFilters()"
        (click)="clearFilters()"
      >
        <ng-icon name="tablerFilterOff" size="16" aria-hidden="true" />
        Clear filters
      </mm-button>
    </div>
  </form>
</mm-paper>
