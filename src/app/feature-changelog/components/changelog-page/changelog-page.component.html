<mm-page-header title="Changelog" subtitle="What's shipped, newest first" />

@if (groups.length === 0) {
  <mm-text as="p" variant="caption">Nothing's been logged here yet.</mm-text>
} @else {
  <div class="flex flex-col gap-4">
    @for (group of groups; track group.date; let isLast = $last) {
      <div>
        <mm-text as="h2" variant="subheading" class="block">{{ group.date }}</mm-text>
        <div class="mt-2 flex flex-col gap-3">
          @for (entry of group.entries; track entry.title) {
            <div class="flex items-start gap-2">
              <mm-badge
                color="primary"
                variant="soft"
                size="sm"
                class="h-auto w-24 whitespace-normal py-1 text-center leading-tight"
                >{{ entry.area }}</mm-badge
              >
              <mm-text as="span" class="block">{{ entry.title }}</mm-text>
            </div>
          }
        </div>
      </div>
      @if (!isLast) {
        <mm-divider />
      }
    }
  </div>
}
