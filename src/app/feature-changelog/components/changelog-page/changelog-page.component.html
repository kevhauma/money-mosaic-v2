<mm-page-header title="Changelog & Roadmap" />

<mm-tabs
  [tabs]="tabs"
  [selected]="selectedTab()"
  (selectedChange)="onTabChange($event)"
  class="mb-4"
/>

@if (activeGroups().length === 0) {
  <mm-text as="p" variant="caption">{{ emptyMessage() }}</mm-text>
} @else {
  <div class="flex flex-col gap-4">
    @for (group of activeGroups(); track group.heading; let isLast = $last) {
      <div>
        <mm-text as="h2" variant="subheading" class="block">{{ group.heading }}</mm-text>
        <div class="mt-2 flex flex-col gap-3">
          @for (entry of group.entries; track entry.key) {
            <div class="flex items-start gap-2">
              <mm-badge
                color="primary"
                variant="soft"
                size="sm"
                class="h-auto w-24 whitespace-normal py-1 text-center leading-tight"
                >{{ entry.area }}</mm-badge
              >
              <mm-text as="span" class="block">{{ entry.title }}</mm-text>
            </div>
          }
        </div>
      </div>
      <mm-divider [class.hidden]="isLast" />
    }
  </div>
}
