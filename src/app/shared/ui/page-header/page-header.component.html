<div class="mb-6 flex flex-wrap items-center justify-between gap-3">
  <div>
    <div class="flex items-center gap-2">
      <mm-text variant="heading" as="h1">{{ title() }}</mm-text>
      <ng-content select="[title-adornment]" />
    </div>
    @if (subtitle()) {
      <mm-text variant="caption" as="p">{{ subtitle() }}</mm-text>
    }
  </div>
  <div class="flex items-center gap-2">
    <ng-content select="[actions]" />
  </div>
</div>
