<mm-dropdown [menu]="false" contentClass="z-10 mt-1 border border-base-300 p-3 shadow-lg">
  <button trigger type="button" tabindex="0" [class]="triggerClasses()" [disabled]="disabled()">
    {{ displayLabel() }}
  </button>
  <calendar-range [attr.value]="calendarValue()" (change)="onCalendarChange($event)">
    <calendar-month></calendar-month>
  </calendar-range>
</mm-dropdown>
