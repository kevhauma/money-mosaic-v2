<ng-template #content>
  <ng-content />
</ng-template>

@if (link(); as href) {
  <a [routerLink]="href" [class]="classes()" [attr.aria-label]="ariaLabel()">
    <ng-container [ngTemplateOutlet]="content" />
  </a>
} @else {
  <button
    [type]="type()"
    [disabled]="disabled()"
    [class]="classes()"
    [attr.aria-label]="ariaLabel()"
  >
    <ng-container [ngTemplateOutlet]="content" />
  </button>
}
