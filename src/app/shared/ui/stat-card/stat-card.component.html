<ng-template #subLabelContent>
  @if (subLabel(); as subLabel) {
    @if (tooltip()) {
      <div class="tooltip tooltip-bottom">
        <div class="tooltip-content">
          @for (line of tooltipLines(); track line) {
            <div>{{ line }}</div>
          }
        </div>
        <div class="stat-desc">{{ subLabel }}</div>
      </div>
    } @else {
      <div class="stat-desc">{{ subLabel }}</div>
    }
  }
</ng-template>

@if (link(); as href) {
  <a [routerLink]="href" [queryParams]="queryParams()" [class]="linkClasses()">
    <div class="stat-title">{{ label() }}</div>
    <div class="stat-value">
      <mm-text variant="display" [color]="color()" [numeric]="true">{{ value() }}</mm-text>
    </div>
    <ng-container [ngTemplateOutlet]="subLabelContent" />
  </a>
} @else {
  <div [class]="classes()">
    <div class="stat-title">{{ label() }}</div>
    <div class="stat-value">
      <mm-text variant="display" [color]="color()" [numeric]="true">{{ value() }}</mm-text>
    </div>
    <ng-container [ngTemplateOutlet]="subLabelContent" />
  </div>
}
