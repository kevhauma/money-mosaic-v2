<mm-modal [(open)]="open">
  <span mm-modal-title>{{ title() }}</span>
  @if (message()) {
    <mm-text as="p" variant="caption" class="py-3">{{ message() }}</mm-text>
  }
  @if (confirmPhrase(); as phrase) {
    <mm-label as="label" variant="fieldset" class="flex-col items-start gap-1">
      <mm-text class="text-xs text-base-content/60">
        Type <span class="font-mono font-semibold">{{ phrase }}</span> to confirm
      </mm-text>
      <input
        #phraseInput
        type="text"
        class="input input-bordered input-sm w-full"
        autocomplete="off"
        [value]="typedPhrase()"
        (input)="typedPhrase.set(phraseInput.value)"
      />
    </mm-label>
  }
  <div class="modal-action">
    <mm-button type="button" (click)="cancel()">{{ cancelLabel() }}</mm-button>
    <mm-button
      type="button"
      [color]="danger() ? 'error' : 'primary'"
      [disabled]="!canConfirm()"
      (click)="confirm()"
    >
      {{ confirmLabel() }}
    </mm-button>
  </div>
</mm-modal>
