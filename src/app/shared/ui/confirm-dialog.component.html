<dialog #dialog class="modal" (close)="open.set(false)">
  <div class="modal-box">
    <h3 class="text-lg font-semibold">{{ title() }}</h3>
    @if (message()) {
      <p class="py-3 text-sm text-base-content/70">{{ message() }}</p>
    }
    <div class="modal-action">
      <button type="button" class="btn" (click)="cancel()">{{ cancelLabel() }}</button>
      <button
        type="button"
        class="btn"
        [class.btn-error]="danger()"
        [class.btn-primary]="!danger()"
        (click)="confirm()"
      >
        {{ confirmLabel() }}
      </button>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button type="submit">close</button>
  </form>
</dialog>
