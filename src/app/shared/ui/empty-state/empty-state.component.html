<mm-flex
  direction="col"
  align="center"
  justify="center"
  gap="3"
  class="mm-empty relative overflow-hidden rounded-box bg-base-100 p-12 text-center"
>
  <!-- Decorative mm-blob wash (theme-style hook; only themes that set --mm-blob-bg render it) —
       TICKET-UI-21 extends the hero-only blob to this second, non-interactive surface. -->
  <div
    class="mm-blob pointer-events-none absolute -top-8 -right-8 h-28 w-28"
    aria-hidden="true"
  ></div>
  <!-- `mm-empty`/`mm-empty-icon` are theme-style hooks — themes restyle the shell and icon chip via scoped CSS. -->
  <div class="mm-empty-icon relative text-base-content/40">
    <ng-content select="[icon]" />
  </div>
  <mm-text as="h2" weight="medium" class="relative text-lg">{{ title() }}</mm-text>
  @if (message()) {
    <mm-text as="p" variant="caption" class="relative max-w-sm">{{ message() }}</mm-text>
  }
  <ng-content select="[action]" />
</mm-flex>
