name: Deploy

# Runs on the self-hosted runner installed on the same machine as Caddy — build output is
# copied straight into the Caddy webroot on disk, no SSH/network transfer involved.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64] 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: 
          clean: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --watch=false

      - name: Build (production)
        run: npm run build -- --configuration production

      - name: Deploy to Caddy webroot
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          target="${DEPLOY_PATH:-/var/www/money-mosaic}"
          mkdir -p "$target"
          rsync -a --omit-dir-times --delete dist/money-mosaic-vibe/browser/ "$target/"
