name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --watch=false
        
  fallow-audit:
    runs-on: ubuntu-latest
    needs: [tests]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: install dependencies
        run: npm ci

      - name: Run fallow audit
        continue-on-error: true
        run: npm run fallow:audit -- --format github-summary >> "$GITHUB_STEP_SUMMARY"

      - name: Generate fallow health badge
        run: npx fallow health --format badge --quiet > .github/badges/fallow-health.svg

      - name: Commit badge
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update fallow health badge [skip ci]'
          file_pattern: .github/badges/fallow-health.svg
  deploy:
    runs-on: [self-hosted, linux, x64]
    needs: [tests, fallow-audit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: 
          clean: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build -- --configuration production

      - name: Deploy to Caddy webroot
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          target="${DEPLOY_PATH:-/var/www/money-mosaic}"
          mkdir -p "$target"
          rsync -a --omit-dir-times --delete dist/money-mosaic-vibe/browser/ "$target/"
